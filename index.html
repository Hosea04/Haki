  <div class="container">
    <h1>CONTACT US</h1>
   <form class="contact-form" action="index.html">

    <input type="text" class="form" placeholder="Your Email">
    <input type="text" class="form" placeholder="Phone">
    <input type="text" class="form" placeholder="Your Case">

    </div>
   </form>
